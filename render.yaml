services:
  - type: web
    name: tail-stock-screener
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py --serve --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: SCAN_LIMIT
        value: "500"
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: 1101600259@qq.com
      - key: SMTP_PASS
        value: wbkxpxkyefsxjfdi
      - key: SMTP_TO
        value: 1101600259@qq.com

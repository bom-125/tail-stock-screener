<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>尾盘选股</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --text2: #94a3b8;
    --red: #ef4444; --green: #22c55e; --amber: #f59e0b;
    --blue: #3b82f6; --purple: #8b5cf6; --gold: #fbbf24;
    --cyan: #06b6d4; --pink: #ec4899; --lime: #84cc16; --live: #10b981;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  .header {
    position: sticky; top:0; z-index:100;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
  }
  .header h1 { font-size:18px; font-weight:700; background: linear-gradient(135deg,var(--amber),#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .live-badge { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--live); font-weight:600; padding:3px 8px; border-radius:10px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--live); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
  .status-dot { width:8px; height:8px; border-radius:50%; }
  .status-dot.open { background:var(--green); box-shadow:0 0 6px var(--green); }
  .status-dot.closed { background:var(--text2); }
  
  .stats-bar { display:flex; gap:6px; padding:10px 14px; overflow-x:auto; }
  .stat-card { flex:0 0 auto; min-width:75px; background:var(--card); border-radius:10px; padding:8px 12px; text-align:center; border:1px solid var(--border); }
  .stat-card .num { font-size:20px; font-weight:800; line-height:1.2; }
  .stat-card .label { font-size:10px; color:var(--text2); margin-top:1px; }
  .stat-card.total .num { color:var(--blue); }
  .stat-card.match .num { color:var(--green); }
  .stat-card.rate .num { color:var(--amber); }
  
  .toolbar { display:flex; gap:8px; padding:0 14px 6px; align-items:center; }
  .btn { border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:4px; transition:all 0.15s; }
  .btn-refresh { background:var(--blue); color:#fff; flex:1; justify-content:center; }
  .btn-refresh:active { opacity:0.8; transform:scale(0.97); }
  .update-time { font-size:10px; color:var(--text2); white-space:nowrap; }
  
  .countdown-bar { height:3px; background:var(--border); border-radius:2px; margin:0 14px 8px; overflow:hidden; }
  .countdown-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--purple)); border-radius:2px; transition:width 1s linear; }
  
  .filter-tags { display:flex; gap:5px; padding:0 14px 8px; flex-wrap:wrap; }
  .filter-tag { font-size:9px; padding:2px 7px; border-radius:8px; background:rgba(139,92,246,0.12); color:var(--purple); border:1px solid rgba(139,92,246,0.25); }
  
  .stock-list { padding:0 14px 16px; }
  .stock-item {
    background:var(--card); border-radius:14px; padding:14px; margin-bottom:10px;
    border:1px solid var(--border); animation:fadeSlideIn 0.3s ease;
  }
  @keyframes fadeSlideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .stock-item:active { transform:scale(0.98); background:#1e3050; }
  
  .stock-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .rank-badge { width:24px; height:24px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; flex-shrink:0; }
  .rank-1 { background:linear-gradient(135deg,#fbbf24,#f59e0b); font-size:14px; }
  .rank-2 { background:linear-gradient(135deg,#94a3b8,#64748b); }
  .rank-3 { background:linear-gradient(135deg,#d97706,#b45309); }
  .rank-other { background:var(--border); }
  .stock-name-code .name { font-size:15px; font-weight:700; }
  .stock-name-code .code { font-size:11px; color:var(--text2); margin-top:1px; }
  .stock-price { text-align:right; }
  .stock-price .price { font-size:18px; font-weight:800; }
  .stock-price .change { font-size:12px; font-weight:600; padding:2px 8px; border-radius:6px; margin-top:2px; display:inline-block; }
  .change.up { background:rgba(34,197,94,0.15); color:var(--green); }
  .change.down { background:rgba(239,68,68,0.15); color:var(--red); }
  
  /* Score bar */
  .score-bar-wrap { margin:8px 0; }
  .score-bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .score-total { font-size:20px; font-weight:800; color:var(--gold); }
  .score-total .unit { font-size:11px; color:var(--text2); font-weight:400; }
  .score-dimensions { display:flex; gap:4px; height:6px; border-radius:3px; overflow:hidden; }
  .score-dim { height:100%; border-radius:1px; }
  .dim-trend { background:var(--blue); }
  .dim-capital { background:var(--green); }
  .dim-sentiment { background:var(--amber); }
  .dim-technical { background:var(--purple); }
  .dim-valuation { background:var(--cyan); }
  
  /* Dimension labels */
  .dim-labels { display:flex; justify-content:space-between; margin-top:4px; flex-wrap:wrap; }
  .dim-label { font-size:9px; display:flex; align-items:center; gap:3px; }
  .dim-dot { width:5px; height:5px; border-radius:50%; }
  
  /* Stock details grid */
  .stock-details { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:10px 0; }
  .detail-item { text-align:center; padding:8px 4px; background:rgba(15,23,42,0.5); border-radius:8px; }
  .detail-item .val { font-size:12px; font-weight:700; }
  .detail-item .lbl { font-size:9px; color:var(--text2); margin-top:1px; }
  .val-green { color:var(--green); }
  .val-red { color:var(--red); }
  .val-amber { color:var(--amber); }
  .val-blue { color:var(--blue); }
  
  .stock-footer { display:flex; justify-content:space-between; align-items:center; padding-top:6px; border-top:1px solid var(--border); font-size:10px; color:var(--text2); }
  
  .empty { text-align:center; padding:60px 20px; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .empty .title { font-size:16px; font-weight:600; margin-bottom:4px; }
  .empty .desc { font-size:13px; color:var(--text2); }
  .loading { text-align:center; padding:40px; }
  .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--blue); color:var(--text); padding:8px 18px; border-radius:20px; font-size:12px; font-weight:600; z-index:200; animation:toastIn 0.3s ease,toastOut 0.3s ease 1.5s forwards; pointer-events:none; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0} }
</style>
</head>
<body>

<div class="header">
  <h1>🔥 尾盘选股</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="live-badge" id="liveBadge"><span class="live-dot"></span> LIVE</div>
    <span class="status-dot" id="statusDot"></span>
  </div>
</div>

<div class="countdown-bar"><div class="countdown-fill" id="countdownFill"></div></div>

<div class="stats-bar">
  <div class="stat-card total"><div class="num" id="statTotal">--</div><div class="label">全市场</div></div>
  <div class="stat-card match"><div class="num" id="statMatch">--</div><div class="label">符合条件</div></div>
  <div class="stat-card rate"><div class="num" id="statRate">--</div><div class="label">命中率</div></div>
  <div class="stat-card" style="flex:1;min-width:90px;"><div class="num" style="font-size:13px;color:var(--text);" id="statTime">--</div><div class="label">更新时间</div></div>
</div>

<div class="toolbar">
  <button class="btn btn-refresh" onclick="doRefresh()"><span>🔄</span> 手动刷新</button>
  <span class="update-time" id="updateLabel">等待数据...</span>
</div>

<div class="filter-tags">
  <span class="filter-tag">涨幅 2%~6.5%</span>
  <span class="filter-tag">量比 ≥1.2</span>
  <span class="filter-tag">换手 3%~15%</span>
  <span class="filter-tag">五维评分</span>
  <span class="filter-tag">资金流向</span>
  <span class="filter-tag">PE/PB估值</span>
</div>

<div class="date-picker-wrap">
  <span style="font-size:12px;color:var(--text2);">历史回看:</span>
  <input type="date" id="histDate" value="" style="flex:1;max-width:160px;">
  <button onclick="loadHistory()">查看</button>
  <button onclick="loadToday()" style="background:#334155;">今日</button>
</div>
<div id="content"><div class="loading"><div class="spinner"></div><div style="color:var(--text2);font-size:13px;">实时分析中...</div></div></div>

<script>
let eventSource = null, refreshCountdown = 60, countdownTimer = null, currentInterval = 60;

function rankClass(i) { return i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'; }
function fmtMoney(v) { if(!v) return '--'; if(v>=1e8) return (v/1e8).toFixed(2)+'亿'; if(v>=1e4) return (v/1e4).toFixed(1)+'万'; return Number(v).toFixed(0); }
function fmtNum(v,d) { return v!=null?v.toFixed(d||2):'--'; }
function valClass(v,t) { return v>=t[0]?'val-green':v>=t[1]?'val-amber':'val-red'; }

function showToast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
}

function renderResult(data, isSse) {
  const c = document.getElementById('content');
  const stocks = data.stocks || [];
  
  document.getElementById('statTotal').textContent = data.total_screened||'--';
  document.getElementById('statMatch').textContent = stocks.length;
  const recoInfo = [];
  if (data.strong_buy_count) recoInfo.push('强推'+data.strong_buy_count);
  if (data.buy_count) recoInfo.push('买入'+data.buy_count);
  if (data.watch_count) recoInfo.push('关注'+data.watch_count);
  if (recoInfo.length) document.getElementById('statTime').textContent = recoInfo.join(' | ');
  document.getElementById('statRate').textContent = data.total_screened>0?(stocks.length/data.total_screened*100).toFixed(2)+'%':'--';
  const ts = data.timestamp||'--';
  document.getElementById('statTime').textContent = ts.includes(' ')?ts.split(' ')[1]:ts;
  document.getElementById('updateLabel').textContent = '更新于 '+ts;
  
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot '+(data.market_open?'open':'closed');
  
  if(isSse) showToast('📊 已更新 · '+stocks.length+' 只标的');
  
  if(!stocks.length) {
    c.innerHTML = '<div class="empty"><div class="icon">💭</div><div class="title">今日无十分推荐</div><div class="desc">筛选出 ' + data.total_screened + ' 只标的，但均未达到推荐标准。建议等待更好机会。</div></div>';
    return;
  }
  
  let h = '<div class="stock-list">';
  stocks.forEach((s,i) => {
    const pctCls = s.pct_change>=0?'up':'down';
    const sc = s.total||0;
    const dims = ['trend','capital','sentiment','technical','valuation'];
    const dimNames = {trend:'趋势',capital:'资金',sentiment:'情绪',technical:'技术',valuation:'估值'};
    const dimCls = {trend:'dim-trend',capital:'dim-capital',sentiment:'dim-sentiment',technical:'dim-technical',valuation:'dim-valuation'};
    const dimCol = {trend:'var(--blue)',capital:'var(--green)',sentiment:'var(--amber)',technical:'var(--purple)',valuation:'var(--cyan)'};
    
    // Fund flow display
    const ff = s.fund_flow||{};
    const mainNet = ff.main_net_inflow;
    const mainRatio = ff.main_net_ratio;
    
    // Enhanced data
    const en = s.enhanced||{};
    const pe = en.pe, pb = en.pb, turnover = en.turnover, mktcap = en.mktcap_yi;
    
        // Tier-based styling
    const tier = s.tier || 'watch';
    const tierLabel = s.tier_label || '';
    h += '<div class="stock-item tier-'+tier+'" style="animation-delay:'+(i*0.03)+'s">';
    // Top: rank + name + price
    h += '<div class="stock-top">';
    h += '<div style="display:flex;align-items:flex-start;gap:8px;">';
    h += '<div class="rank-badge '+rankClass(i)+'">'+(i<3?i+1:i+1)+'</div>';
    h += '<div class="stock-name-code"><div class="name">'+s.name+'<span class="reco-badge reco-'+recoLevel+'">'+reco+'</span></div><div class="code">'+s.code+'</div></div>';
    h += '</div>';
    h += '<div class="stock-price"><div class="price">'+fmtNum(s.price,2)+'</div>';
    h += '<div class="change '+pctCls+'">'+(s.pct_change>=0?'+':'')+fmtNum(s.pct_change,2)+'%</div></div>';
    h += '</div>';
    
    // Recommendation badge
    const reco = s.recommendation || '';
    const recoLevel = s.reco_level || '';
    
    // Score bar
    h += '<div class="score-bar-wrap">';
    h += '<div class="score-bar-header"><span style="font-size:10px;color:var(--text2);">综合评分</span><span class="score-total">'+fmtNum(sc,1)+'<span class="unit">/100</span></span></div>';
    h += '<div class="score-dimensions">';
    dims.forEach(d => {
      const v = s[d]||0;
      h += '<div class="score-dim '+dimCls[d]+'" style="width:'+v+'%" title="'+dimNames[d]+': '+v+'"></div>';
    });
    h += '</div>';
    h += '<div class="dim-labels">';
    dims.forEach(d => {
      h += '<span class="dim-label"><span class="dim-dot" style="background:'+dimCol[d]+';"></span>'+dimNames[d]+' '+fmtNum(s[d],0)+'</span>';
    });
    h += '</div></div>';
    
    // Detail grid (6 items: turnover, main inflow, main ratio, PE, volume ratio, market cap)
    const volRatio = en.volume_ratio;
    const momentum = en.momentum;
    const bidAsk = en.bid_ask;
    const chg5d = en.chg_5d;
    const chgYtd = en.chg_ytd;
    const sector = en.sector || '';
    
    h += '<div class="stock-details">';
    h += '<div class="detail-item"><div class="val '+valClass(turnover||0,[8,4])+'">'+fmtNum(turnover,1)+'%</div><div class="lbl">换手率</div></div>';
    h += '<div class="detail-item"><div class="val">'+fmtMoney(mainNet)+'</div><div class="lbl">主力净流入</div></div>';
    h += '<div class="detail-item"><div class="val '+valClass(mainRatio||0,[3,0])+'">'+fmtNum(mainRatio,2)+'%</div><div class="lbl">主力净占比</div></div>';
    h += '<div class="detail-item"><div class="val">'+fmtNum(pe,1)+'</div><div class="lbl">市盈率PE</div></div>';
    h += '<div class="detail-item"><div class="val '+valClass(volRatio||0,[2,0.8])+'">'+fmtNum(volRatio,2)+'</div><div class="lbl">量比</div></div>';
    h += '<div class="detail-item"><div class="val">'+fmtNum(mktcap,0)+'亿</div><div class="lbl">流通市值</div></div>';
    h += '</div>';
    
    // Extra data row (momentum, bid/ask, 5d change)
    h += '<div class="extra-grid">';
    h += '<div class="extra-item"><span class="val '+((momentum||0)>=0?'green':'red')+'">'+(momentum>=0?'+':'')+fmtNum(momentum,2)+'%</span><span class="lbl">涨速</span></div>';
    h += '<div class="extra-item"><span class="val '+((bidAsk||0)>=0?'green':'red')+'">'+(bidAsk>=0?'+':'')+fmtNum(bidAsk,2)+'%</span><span class="lbl">委比</span></div>';
    h += '<div class="extra-item"><span class="val '+((chg5d||0)>=0?'green':'red')+'">'+(chg5d>=0?'+':'')+fmtNum(chg5d,2)+'%</span><span class="lbl">5日涨跌</span></div>';
    h += '</div>';
    
    // Signals from recommendation
    const signals = s.signals || [];
    if (signals.length > 0) {
        h += '<div class="signals-list">';
        signals.forEach(sig => {
            let cls = 'sig-info';
            if (sig.includes('风险')||sig.includes('走弱')||sig.includes('偏低')||sig.includes('流出')) cls = 'sig-warn';
            else if (sig.includes('优秀')||sig.includes('流入')||sig.includes('强势')) cls = 'sig-good';
            h += '<span class="signal-tag '+cls+'">'+sig+'</span>';
        });
        h += '</div>';
    }
    
    // Prediction box (明日预判)
    const pred = s.prediction;
    if (pred) {
        const dirCls = pred.direction.includes('涨') ? 'up' : (pred.direction.includes('跌') ? 'down' : 'neutral');
        h += '<div class="predict-box">';
        h += '<div class="predict-header">';
        h += '<span style="font-size:14px;">🔮</span>';
        h += '<span class="predict-direction '+dirCls+'">明日预判：'+pred.direction+'</span>';
        h += '<span class="predict-confidence">置信度 '+fmtNum(pred.confidence,0)+'%</span>';
        h += '</div>';
        if (pred.signals && pred.signals.length > 0) {
            h += '<div class="predict-signals">';
            pred.signals.forEach(ps => { h += '<div>• '+ps+'</div>'; });
            h += '</div>';
        }
        h += '</div>';
    }
    
    // SEPA badges (九步法指标)
    const sepa = s.sepa;
    if (sepa) {
        h += '<div class="sepa-badges">';
        if (sepa.above_ma50 && sepa.above_ma150) {
            h += '<span class="sepa-badge good">MA多头排列</span>';
        } else if (sepa.above_ma50) {
            h += '<span class="sepa-badge good">站上MA50</span>';
        }
        if (sepa.has_limit_up) {
            h += '<span class="sepa-badge good">涨停基因('+sepa.limit_up_count+'次)</span>';
        }
        if (sepa.volume_expanding) {
            h += '<span class="sepa-badge good">量能放大'+sepa.vol_ratio_50d.toFixed(1)+'x</span>';
        }
        if (sepa.near_20d_high) {
            h += '<span class="sepa-badge good">接近新高</span>';
        }
        if (sepa.has_long_upper_shadow) {
            h += '<span class="sepa-badge warn">长上影</span>';
        }
        if (!sepa.above_ma50) {
            h += '<span class="sepa-badge warn">低于MA50</span>';
        }
        h += '</div>';
    }
    
    // Sell advice box (卖出建议)
        // Sell advice box (卖出建议)
    const sellAdvice = s.sell_advice;
    if (sellAdvice) {
        h += '<div class="sell-box">';
        h += '<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">';
        h += '<span style="font-size:14px;">💰</span>';
        h += '<span class="sell-advice">'+sellAdvice+'</span>';
        h += '</div>';
        if (s.sell_detail && s.sell_detail.length > 0) {
            h += '<div class="sell-detail">';
            s.sell_detail.forEach(d => { h += '<div>• '+d+'</div>'; });
            h += '</div>';
        }
        if (s.target_high || s.target_low) {
            h += '<div class="target-price">';
            if (s.target_high) h += '<span>目标区间 <span class="tp-low">'+fmtNum(s.target_low,2)+'</span> ~ <span class="tp-high">'+fmtNum(s.target_high,2)+'</span></span>';
            h += '</div>';
        }
        h += '</div>';
    }
    
    // Footer
    h += '<div class="stock-footer"><span>振幅 '+fmtNum(s.amplitude,2)+'%</span><span>成交 '+fmtMoney(s.amount)+'</span>'+(sector?'<span>'+sector+'</span>':'')+'</div>';
    h += '</div>';
    // Add tier divider before group changes
    if (i === 0) {
      h += '<div class="tier-divider '+tier+'" style="margin-top:0">' + tierLabel + ' (' + stocks.filter(x=>x.tier===tier).length + '只)</div>';
    } else if (stocks[i-1] && stocks[i-1].tier !== tier) {
      h += '<div class="tier-divider '+tier+'">' + tierLabel + ' (' + stocks.filter(x=>x.tier===tier).length + '只)</div>';
    }
  });
  h += '</div>';
  c.innerHTML = h;
}

function connectSSE() {
  if(eventSource) eventSource.close();
  eventSource = new EventSource('/api/stream');
  eventSource.onopen = () => { document.getElementById('liveBadge').style.opacity='1'; };
  eventSource.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.type==='update'&&msg.data) {
        renderResult({...msg.data, market_open:msg.market_open, timestamp:msg.timestamp}, true);
        fetch('/api/status').then(r=>r.json()).then(s=>{currentInterval=s.refresh_interval||60;refreshCountdown=currentInterval;});
      }
    } catch(_) {}
  };
  eventSource.onerror = () => { document.getElementById('liveBadge').style.opacity='0.4'; eventSource.close(); setTimeout(connectSSE,5000); };
}

function updateCountdown() {
  refreshCountdown--; if(refreshCountdown<=0) refreshCountdown=currentInterval;
  document.getElementById('countdownFill').style.width = ((currentInterval-refreshCountdown)/currentInterval*100)+'%';
}

async function doRefresh() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div style="color:var(--text2);font-size:13px;">正在刷新分析...</div></div>';
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 35000);
    const r = await (await fetch('/api/refresh', { signal: controller.signal })).json();
    clearTimeout(timeout);
    renderResult(r);
    const s = await (await fetch('/api/status')).json();
    currentInterval = s.refresh_interval||60; refreshCountdown = currentInterval;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">⚠️</div><div class="title">刷新失败</div><div class="desc">'+e.message+'</div></div>';
  }
}

let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => { if(window.scrollY===0 && e.changedTouches[0].clientY-touchStartY>80) doRefresh(); });

async function loadHistory() {
  const date = document.getElementById('histDate').value;
  if (!date) return;
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div style="color:var(--text2);font-size:13px;">加载' + date + '历史数据...</div></div>';
  try {
    const r = await (await fetch('/api/history?date=' + date)).json();
    if (r.success || r.error) {
      renderResult(r);
      document.getElementById('updateLabel').textContent = '历史: ' + date;
    }
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">⚠️</div><div class="title">加载失败</div><div class="desc">请检查日期是否正确</div></div>';
  }
}

function loadToday() {
  document.getElementById('histDate').value = '';
  init();
}

async function init() {
  const c = document.getElementById('content');
  
  // Retry fetch with timeout
  let loaded = false;
  for (let retry = 0; retry < 3 && !loaded; retry++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);
      const resp = await fetch('/api/screen', { signal: controller.signal });
      clearTimeout(timeout);
      
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.stocks) {
          renderResult(data);
          loaded = true;
        } else if (data && data.success !== undefined) {
          renderResult(data);
          loaded = true;
        }
      }
    } catch(e) {
      console.log('Fetch attempt ' + (retry+1) + ' failed: ' + e.message);
      if (retry < 2) await new Promise(r => setTimeout(r, 3000));
    }
  }
  
  if (!loaded) {
    c.innerHTML = '<div class="empty"><div class="icon">⏳</div><div class="title">连接中...</div><div class="desc">正在等待服务器响应，请稍后刷新页面</div></div>';
  }
  
  try { const s = await (await fetch('/api/status')).json(); currentInterval=s.refresh_interval||60; refreshCountdown=currentInterval; } catch(e) {}
  connectSSE();
  countdownTimer = setInterval(updateCountdown, 1000);
}
init();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>尾盘选股</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ddd;font-family:sans-serif;padding:10px;font-size:14px}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#4fc3f7;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:bold;text-align:center;text-decoration:none}
.btn:active{opacity:.7}
.btn2{background:#333;color:#ddd}
.card{background:#222;padding:12px;margin:8px 0;border-radius:8px;border-left:3px solid #4fc3f7}
.green{color:#66bb6a}.red{color:#ef5350}.orange{color:#ffa726}
table{width:100%;border-collapse:collapse;font-size:12px}
td,th{padding:5px 3px;border-bottom:1px solid #333;text-align:left}
.signal{padding:4px 8px;border-radius:4px;font-size:11px;margin:3px 0;font-weight:bold}
.sig-danger{background:#3d1515;color:#ef5350}
.sig-warn{background:#3d2e15;color:#ffa726}
.sig-ok{background:#153d15;color:#66bb6a}
.hint{color:#888;font-size:12px;margin:8px 0}
.loading{text-align:center;padding:20px;color:#888}
</style>
</head>
<body>
<h2 style="color:#4fc3f7;margin-bottom:4px">尾盘选股 V8i+</h2>
<p class="hint" id="status">点击加载数据</p>
<button class="btn" onclick="loadScan()">今日推荐</button>
<button class="btn btn2" onclick="loadHoldings()">持仓分析</button>
<div id="content"></div>
<div id="loader" class="loading" style="display:none">加载中...</div>

<script>
var API="https://tail-stock-screener-production.up.railway.app";
function show(s){document.getElementById("loader").style.display=s?"block":"none"}
function err(s){document.getElementById("status").textContent=s}

// Load scan results
function loadScan(){
  show(1);document.getElementById("content").innerHTML="";err("正在扫描...");
  // Start async scan
  fetch(API+"/api/scan?async=1&min_score=30").then(function(r){return r.json()}).then(function(d){
    if(d.status!=="started"){err("扫描启动失败");show(0);return}
    pollScan();
  }).catch(function(e){err("连接失败，请重试");show(0)});
}
var pollCount=0;
function pollScan(){
  pollCount++;
  fetch(API+"/api/progress").then(function(r){return r.json()}).then(function(p){
    err(p.msg||"扫描中...");
    if(p.status==="done"&&p.results){
      show(0);
      var h='<table><tr><th>#</th><th>代码</th><th>名称</th><th>评分</th><th>涨跌</th><th>建议</th></tr>';
      p.results.forEach(function(x,i){
        var c=x.change_pct>=0?"green":"red";
        h+='<tr><td>'+(i+1)+'</td><td><b>'+x.code+'</b></td><td>'+x.name+'</td><td>'+x.score+'</td>';
        h+='<td class="'+c+'">'+(x.change_pct>=0?"+":"")+x.change_pct.toFixed(2)+'%</td>';
        h+='<td>'+x.advice+'</td></tr>';
      });
      h+='</table>';
      document.getElementById("content").innerHTML=h;
      err("共 "+p.results.length+" 只推荐");
    }else if(p.status==="error"){show(0);err("错误: "+p.msg)}
    else if(pollCount<180){setTimeout(pollScan,800)}
    else{show(0);err("超时，请重试")}
  }).catch(function(e){show(0);err("网络错误")});
}

// Load holdings
function loadHoldings(){
  show(1);document.getElementById("content").innerHTML="";err("加载持仓...");
  fetch(API+"/api/holdings/analyze").then(function(r){return r.json()}).then(function(d){
    show(0);
    var h=d.holdings||[];
    if(!h.length){document.getElementById("content").innerHTML='<p style="color:#888;text-align:center;padding:20px">暂无持仓</p>';err("无持仓");return}
    var html="";
    h.forEach(function(o){
      var pnl=o.pnl_pct||0,pc=pnl>=0?"green":"red";
      html+='<div class="card">';
      html+='<b style="color:#4fc3f7">'+o.code+'</b> '+o.name+' <span class="'+pc+'">'+(pnl>=0?"+":"")+pnl.toFixed(2)+'%</span>';
      html+='<br>现价 '+(o.cur_price||0).toFixed(2)+' | 成本 '+(o.buy_price||0).toFixed(2);
      html+='<br>止损 <span class="red">'+(o.sl_price||0).toFixed(2)+'</span> | 止盈 <span class="green">'+(o.tp_price||0).toFixed(2)+'</span>';
      if(o.sell_signals)o.sell_signals.forEach(function(s){
        var cls=s.indexOf("触发")>=0||s.indexOf("止损")>=0?"sig-danger":s.indexOf("走弱")>=0?"sig-warn":"sig-ok";
        html+='<div class="signal '+cls+'">'+s+'</div>';
      });
      html+='<div style="font-size:12px;margin-top:4px">'+o.advice+' | '+o.reason+'</div>';
      html+='</div>';
    });
    document.getElementById("content").innerHTML=html;
    err("持仓 "+h.length+" 只 | 总盈亏 "+(d.total_pnl||0).toFixed(0)+"元");
  }).catch(function(e){show(0);err("网络错误")});
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???? V8i+ | ?????</title>
<style>
:root{--bg:#0f0f14;--card:#1a1a24;--border:#2a2a3a;--text:#e0e0e0;--muted:#888;--accent:#4fc3f7;--green:#66bb6a;--red:#ef5350;--orange:#ffa726;--purple:#ab47bc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:20px;font-weight:700;color:var(--accent)}
header .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.status-live{background:var(--green);animation:pulse 2s infinite}
.status-closed{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:1200px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:10px;overflow:hidden}
.tab{padding:12px 24px;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
.tab .badge{background:var(--red);color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:700}
.panel{display:none}
.panel.active{display:block}

/* Holdings */
.holdings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.holding-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s}
.holding-card:hover{border-color:var(--accent)}
.holding-card.alert-danger{border-color:var(--red);animation:alertPulse 1.5s infinite}
@keyframes alertPulse{0%,100%{box-shadow:0 0 0px var(--red)}50%{box-shadow:0 0 16px rgba(239,83,80,.3)}}
.hc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hc-code{font-size:18px;font-weight:700;color:var(--accent)}
.hc-name{font-size:13px;color:var(--muted)}
.hc-price{text-align:right}
.hc-price .cur{font-size:22px;font-weight:700}
.hc-price .chg{font-size:14px;font-weight:600}
.hc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:13px;margin-bottom:10px}
.hc-grid span{color:var(--muted)}
.hc-grid strong{color:var(--text)}
.hc-signals{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.hc-signal{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;margin:3px 0}
.signal-danger{background:rgba(239,83,80,.15);color:var(--red)}
.signal-warn{background:rgba(255,167,38,.15);color:var(--orange)}
.signal-ok{background:rgba(102,187,106,.15);color:var(--green)}
.hc-advice{font-weight:700;font-size:13px;margin-top:6px}

/* Scan */
.scan-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.btn{padding:10px 24px;border-radius:8px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#81d4fa}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px}
input,select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px}
input:focus{outline:none;border-color:var(--accent)}
.scan-result{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.scan-result table{width:100%;border-collapse:collapse}
.scan-result th{text-align:left;padding:10px 14px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
.scan-result td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}
.scan-result tr:hover{background:rgba(79,195,247,.05)}

/* Loader */
.loader-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,15,20,.9);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
.loader-overlay.show{opacity:1;pointer-events:all}
.loader-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px 40px;text-align:center;min-width:300px}
.loader-bar-bg{height:8px;background:var(--border);border-radius:4px;margin:16px 0;overflow:hidden}
.loader-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .3s;width:0%}
.loader-title{font-weight:700;font-size:16px;margin-bottom:4px}
.loader-stage{font-size:13px;color:var(--muted)}
/* Add holding form */
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.form-row input{width:110px}

/* Alert list */
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.alert-time{font-size:12px;color:var(--muted);min-width:70px}
.alert-type-tag{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;white-space:nowrap}
.tag-stop{background:rgba(239,83,80,.2);color:var(--red)}
.tag-tp{background:rgba(102,187,106,.2);color:var(--green)}
.tag-weak{background:rgba(255,167,38,.2);color:var(--orange)}
.alert-msg{font-size:13px;flex:1}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>
<header>

<script>
// ---- Utils ----
function getLatestTradeDay(d){d=new Date(d);var day=d.getDay(),h=d.getHours();if(day===0){d.setDate(d.getDate()-2)}else if(day===6){d.setDate(d.getDate()-1)}else if(day===1&&h<9){d.setDate(d.getDate()-3)}else if(h<9){d.setDate(d.getDate()-1)}return d.toISOString().split("T")[0]}
var _store=[];

// ---- Tab switching ----
var currentTab="holdings";
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",t.textContent.includes(tab==="holdings"?"??":tab==="scan"?"??":"??"))});
  document.querySelectorAll(".panel").forEach(function(p,i){
    var ids=["panel-holdings","panel-scan","panel-alerts"];
    p.classList.toggle("active",p.id===ids[tab==="holdings"?0:tab==="scan"?1:2]);
  });
  if(tab==="holdings")refreshHoldings();
  if(tab==="alerts")refreshAlerts();
}

// ---- Holdings ----
function toggleAddForm(){
  var f=document.getElementById("add-form");
  f.style.display=f.style.display==="none"?"block":"none";
}
function addHolding(){
  var code=document.getElementById("add-code").value.trim();
  var name=document.getElementById("add-name").value.trim();
  var price=parseFloat(document.getElementById("add-price").value);
  var shares=parseInt(document.getElementById("add-shares").value);
  var date=document.getElementById("add-date").value;
  if(!code||!name||!price||!shares){alert("???????");return}
  var xhr=new XMLHttpRequest();
  xhr.open("POST","/api/holdings",true);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.onload=function(){
    if(xhr.status===200){toggleAddForm();refreshHoldings()}
    else{alert("????")}
  };
  xhr.send(JSON.stringify({code:code,name:name,buy_price:price,shares:shares,buy_date:date}));
}
function deleteHolding(code){
  if(!confirm("???? "+code+"?"))return;
  var xhr=new XMLHttpRequest();
  xhr.open("DELETE","/api/holdings?code="+code,true);
  xhr.onload=function(){refreshHoldings()};
  xhr.send();
}
function refreshHoldings(){
  // Fetch holdings
  var xhr=new XMLHttpRequest();
  xhr.open("GET","/api/holdings",true);
  xhr.onload=function(){
    var holdings=JSON.parse(xhr.responseText);
    // Analyze them
    var ax=new XMLHttpRequest();
    ax.open("GET","/api/holdings/analyze",true);
    ax.onload=function(){
      var data=JSON.parse(ax.responseText);
      var results=data.holdings||[];
      document.getElementById("holding-count").textContent=results.length;
      document.getElementById("total-value").textContent=(data.total_value||0).toLocaleString("zh-CN",{style:"currency",currency:"CNY"});
      var pnl=data.total_pnl||0;
      var pnlEl=document.getElementById("total-pnl");
      pnlEl.textContent=(pnl>=0?"+":"")+pnl.toFixed(0)+"?";
      pnlEl.style.color=pnl>=0?"var(--green)":"var(--red)";
      renderHoldings(results);
    };
    ax.send();
  };
  xhr.send();
}
function renderHoldings(results){
  var grid=document.getElementById("holdings-grid");
  if(results.length===0){grid.innerHTML='<div class="empty-state">?????????????</div>';return}
  var h="";
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var pnl=r.pnl_pct||0;
    var pnlColor=pnl>=0?"var(--green)":"var(--red)";
    var hasDanger=r.sell_signals&&r.sell_signals.some(function(s){return s.indexOf("??")>=0||s.indexOf("??")>=0||s.indexOf("??")>=0});
    var cardClass=hasDanger?"holding-card alert-danger":"holding-card";
    h+='<div class="'+cardClass+'">';
    h+='<div class="hc-header"><div><span class="hc-code">'+r.code+'</span> <span class="hc-name">'+r.name+'</span></div>';
    h+='<div class="hc-price"><div class="cur" style="color:'+pnlColor+'">'+(r.cur_price||0).toFixed(2)+'</div>';
    h+='<div class="chg" style="color:'+pnlColor+'">'+(pnl>=0?"+":"")+pnl.toFixed(2)+'%</div></div></div>';
    h+='<div class="hc-grid">';
    h+='<span>??</span><strong>'+(r.buy_price||0).toFixed(2)+'</strong>';
    h+='<span>??</span><strong>'+(r.shares||0)+'</strong>';
    h+='<span>??</span><strong>'+(r.market_value||0).toLocaleString()+'</strong>';
    h+='<span>??</span><strong style="color:'+pnlColor+'">'+(r.pnl_amt||0).toFixed(0)+'?</strong>';
    h+='<span>??</span><strong style="color:var(--red)">'+(r.sl_price||0).toFixed(2)+'</strong>';
    h+='<span>??</span><strong style="color:var(--green)">'+(r.tp_price||0).toFixed(2)+'</strong>';
    h+='</div>';
    if(r.sell_signals&&r.sell_signals.length>0){
      h+='<div class="hc-signals">';
      for(var j=0;j<r.sell_signals.length;j++){
        var s=r.sell_signals[j];
        var cls="signal-ok";
        if(s.indexOf("??")>=0||s.indexOf("??")>=0)cls="signal-danger";
        else if(s.indexOf("??")>=0||s.indexOf("?")>=0||s.indexOf("?")>=0)cls="signal-warn";
        h+='<div class="hc-signal '+cls+'">'+s+'</div>';
      }
      h+='</div>';
    }
    h+='<div class="hc-advice" style="color:'+(r.advice.indexOf("?")>=0?"var(--red)":"var(--accent)")+'">??: '+r.advice+' | '+r.reason+'</div>';
    h+='<div style="margin-top:6px"><button class="btn btn-sm" onclick="deleteHolding(\''+r.code+'\')" style="background:var(--red);color:#fff;font-size:11px;padding:3px 10px">??</button></div>';
    h+='</div>';
  }
  grid.innerHTML=h;
}

// ---- Scan (async mode) ----
function setToday(){
  document.getElementById("td").value=getLatestTradeDay(new Date());
  startScan();
}
var _scanPollTimer=null;
function startScan(){
  var ms=document.getElementById("ms").value;
  var td=document.getElementById("td").value;
  var isToday=(td===getLatestTradeDay(new Date()));
  var btn=document.getElementById("btn");var tip=document.getElementById("tip");
  var status=document.getElementById("status");var card=document.getElementById("card");
  var ov=document.getElementById("loader-overlay");var bar=document.getElementById("loader-bar");
  var ltitle=document.getElementById("loader-title");var lstage=document.getElementById("loader-stage");
  
  btn.disabled=true;btn.textContent="???...";card.style.display="none";status.textContent="";
  bar.style.width="0%";ltitle.textContent="????...";lstage.textContent="???...";ov.classList.add("show");
  if(_scanPollTimer)clearInterval(_scanPollTimer);
  
  var scanDone=false,pollCount=0;
  _scanPollTimer=setInterval(function(){
    var px=new XMLHttpRequest();
    px.open("GET","/api/progress",true);px.timeout=3000;
    px.onload=function(){
      try{
        var p=JSON.parse(px.responseText);pollCount++;
        if(p.total>0){var rp=Math.min(95,Math.round(p.done/p.total*100));bar.style.width=rp+"%";ltitle.textContent="?? "+rp+"%"}
        if(p.msg)lstage.textContent=p.msg;
        if(p.status==="done"&&p.results&&!scanDone){
          scanDone=true;clearInterval(_scanPollTimer);
          bar.style.width="100%";ltitle.textContent="??!";
          setTimeout(function(){ov.classList.remove("show")},400);
          var d={date:td||p.date,count:p.results.length,elapsed:(pollCount*0.5).toFixed(1),results:p.results,mode:"Live"};
          if(p.results.length===0){status.innerHTML='<span style="color:var(--orange)">????????</span>'}
          else{status.innerHTML='<span style="color:var(--green)">????! '+p.results.length+' ?</span>';renderScan(d)}
          tip.textContent="?? "+(pollCount*0.5).toFixed(1)+"?";btn.disabled=false;btn.textContent="????";
        }
        if(p.status==="error"&&!scanDone){scanDone=true;clearInterval(_scanPollTimer);ov.classList.remove("show");status.innerHTML='<span style="color:var(--red)">??: '+p.msg+'</span>';btn.disabled=false;btn.textContent="????"}
        if(pollCount>180&&!scanDone){scanDone=true;clearInterval(_scanPollTimer);ov.classList.remove("show");status.innerHTML='<span style="color:var(--red)">??</span>';btn.disabled=false;btn.textContent="????"}
      }catch(e){}
    };
    px.send();
  },500);
  
  var url="/api/scan?min_score="+ms+"&async=1";
  if(!isToday)url+="&date="+td;
  var xhr=new XMLHttpRequest();xhr.open("GET",url,true);xhr.timeout=10000;xhr.send();
}
function renderScan(d){
  var card=document.getElementById("card");card.style.display="block";
  document.getElementById("rd").textContent="?? | "+d.date;
  document.getElementById("rc").textContent=d.count+" ? | "+d.elapsed+"?";
  var h="";
  for(var i=0;i<d.results.length;i++){
    var x=d.results[i],dt=x.details||{},sc=x.score;
    var label=sc>=80?"????":sc>=70?"??":sc>=60?"????":sc>=50?"??":"??";
    var chg=x.change_pct||0;var chgStr=(chg>=0?"+":"")+chg.toFixed(2)+"%";
    var chgColor=chg>=3?"var(--green)":chg>=0?"var(--accent)":"var(--red)";
    var mkt=dt.market_label||dt.market||"--";
    h+="<tr><td>"+(i+1)+"</td><td style='font-weight:600;color:var(--accent)'>"+x.code+"</td><td>"+x.name+"</td>";
    h+="<td><b>"+x.score+"</b></td><td>"+(x.price||0).toFixed(2)+"</td>";
    h+="<td style='color:"+chgColor+";font-weight:600'>"+chgStr+"</td>";
    h+="<td style='font-weight:700;color:"+(x.advice.indexOf("??")>=0?"var(--purple)":"var(--accent)")+"'>"+x.advice+"</td>";
    h+="<td style='font-size:12px'>"+mkt+"</td>";
    h+="<td style='font-size:12px'>"+dt.buy_timing+"</td></tr>";
  }
  document.getElementById("tbody").innerHTML=h;
}

// ---- Alerts ----
function refreshAlerts(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","/api/alerts",true);
  xhr.onload=function(){
    var alerts=JSON.parse(xhr.responseText)||[];
    var badge=document.getElementById("alert-badge");
    if(alerts.length>0){badge.style.display="inline";badge.textContent=alerts.length}
    else{badge.style.display="none"}
    document.getElementById("alerts-info").textContent="? "+alerts.length+" ???";
    renderAlerts(alerts);
  };
  xhr.send();
}
function renderAlerts(alerts){
  var el=document.getElementById("alert-list");
  if(alerts.length===0){el.innerHTML='<div class="empty-state">??????</div>';return}
  var h="";
  for(var i=0;i<alerts.length;i++){
    var a=alerts[i];
    var tagCls=a.type.indexOf("??")>=0||a.type.indexOf("??")>=0?"tag-tp":a.type.indexOf("??")>=0?"tag-stop":"tag-weak";
    h+='<div class="alert-item"><span class="alert-time">'+a.time+'</span>';
    h+='<span class="alert-type-tag '+tagCls+'">'+a.type+'</span>';
    h+='<b style="color:var(--accent)">'+a.code+' '+a.name+'</b>';
    h+='<span class="alert-msg">'+a.msg+'</span>';
    h+='<span style="font-size:12px">??: '+(a.pnl_pct>=0?"+":"")+a.pnl_pct.toFixed(2)+'%</span></div>';
  }
  el.innerHTML=h;
}

// ---- Market Status Polling ----
function checkMarket(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","/api/monitor",true);xhr.timeout=3000;
  xhr.onload=function(){
    try{
      var s=JSON.parse(xhr.responseText);
      var dot=document.getElementById("mkt-dot");
      var st=document.getElementById("mkt-status");
      var ms=document.getElementById("monitor-status");
      if(s.running){
        dot.className="status-dot status-live";
        st.textContent="?????";
        ms.textContent="????: "+s.last_check+" | ??: "+s.holdings_count+"?";
      }else{
        dot.className="status-dot status-closed";
        st.textContent="?????";
        ms.textContent="????: "+(s.last_check||"--");
      }
    }catch(e){}
  };
  xhr.send();
}

// ---- Init ----
document.getElementById("td").value=getLatestTradeDay(new Date());
setInterval(checkMarket,30000);
checkMarket();
refreshHoldings();
